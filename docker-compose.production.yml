version: '3.8'

services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/retail-inventory-backend:latest
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/retail-inventory-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
