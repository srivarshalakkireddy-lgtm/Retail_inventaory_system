name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Backend Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/retail-inventory-backend:latest

    - name: Build and Push Frontend Image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        build-args: |
          REACT_APP_API_URL=http://${{ secrets.AWS_EC2_IP }}:5000/api
        tags: ghcr.io/${{ github.repository_owner }}/retail-inventory-frontend:latest

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.AWS_EC2_IP }}
        username: ubuntu
        key: ${{ secrets.AWS_SSH_KEY }}
        command_timeout: 30m
        script: |
          # 1. Project folder Setup
          if [ ! -d "retail-project" ]; then
            git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} retail-project
          fi
          cd retail-project
          
          # 2. .env file update
          echo "${{ secrets.BACKEND_ENV }}" > backend/.env
          
          # 3. GitHub Registry Login on EC2
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # 4. Pull Latest Images and Restart
          export GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}
          docker compose -f docker-compose.production.yml pull
          docker compose -f docker-compose.production.yml up -d
          
          # 5. Cleanup
          docker image prune -f
